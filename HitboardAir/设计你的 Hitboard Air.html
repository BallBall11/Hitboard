<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计你的 Hitboard Air～</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            transition: background-color 0.2s, color 0.2s;
        }
        .editor-container {
            max-width: 1400px;
            width: 100%;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            backdrop-filter: blur(2px);
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .preview-area {
            flex: 1.2;
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right-width: 1px;
            border-right-style: solid;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .main-title {
            font-size: 2.16rem;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
            align-self: flex-start;
            padding-left: 8px;
            transition: color 0.2s, border-color 0.2s;
        }
        .editable-name {
            cursor: pointer;
            border-bottom-width: 1px;
            border-bottom-style: dashed;
            display: inline-block;
            min-width: 2em;
            text-align: center;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .editable-name:hover {
            transition: background-color 0.2s;
        }
        .canvas-wrapper {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 33px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
            padding: 24px 12px 12px 12px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .product-canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 260 / 100;
            background: #ffffff;
            border-radius: 23px;
            overflow: hidden;
            border-width: 1px;
            border-style: solid;
            cursor: grab;
            transition: border-color 0.2s;
        }
        .product-canvas-container:active {
            cursor: grabbing;
        }
        canvas#productCanvas {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            background: #ffffff;
        }
        .hint-text {
            margin-top: 16px;
            font-size: 0.9rem;
            display: flex;
            gap: 32px;
            justify-content: center;
            padding: 8px 24px;
            border-radius: 40px;
            transition: background-color 0.2s, color 0.2s;
        }
        .hint-text span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .control-panel {
            width: 360px;
            padding: 32px 24px;
            overflow-y: auto;
            max-height: 800px;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        .control-panel h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 28px;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .option-group {
            margin-bottom: 32px;
            border-bottom-width: 1px;
            border-bottom-style: solid;
            padding-bottom: 24px;
            transition: border-color 0.2s;
        }
        .option-group h3 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 450;
            transition: color 0.2s;
        }
        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .color-label {
            font-size: 0.95rem;
            width: 90px;
            transition: color 0.2s;
        }
        input[type="color"] {
            width: 70px;
            height: 42px;
            border-width: 2px;
            border-style: solid;
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            padding: 2px;
            transition: border-color 0.2s;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 10px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0 10px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            transition: accent-color 0.2s;
        }
        .feature-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .feature-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            transition: accent-color 0.2s;
        }
        .wallpaper-upload {
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border-width: 1px;
            border-style: dashed;
            margin-top: 10px;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .action-btn {
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-width: 1px;
            border-style: solid;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        .action-btn.small {
            padding: 8px 12px;
            font-size: 0.85rem;
        }
        .file-input {
            display: none;
        }
        .wallpaper-status {
            margin-top: 14px;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .slider-container {
            margin-top: 16px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 4px;
            transition: color 0.2s;
        }
        input[type=range] {
            width: 100%;
            height: 4px;
            border-radius: 4px;
            -webkit-appearance: none;
            transition: background-color 0.2s;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .export-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 28px;
        }
        .export-btn {
            border: none;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-width: 1px;
            border-style: solid;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            text-align: center;
            border-top-width: 1px;
            border-top-style: solid;
            padding-top: 18px;
            transition: color 0.2s, border-color 0.2s;
        }
        .designer-credit {
            margin-top: 16px;
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
            transition: color 0.2s;
        }

        /* ----- 深色主题（默认） ----- */
        body {
            background: #f5f7fa;
        }
        .editor-container {
            background: #ffffff;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
            border: 1px solid rgba(224, 230, 238, 0.6);
        }
        .preview-area {
            background: #fafcff;
            border-right-color: #e8ecf2;
        }
        .main-title {
            color: #1e2b3c;
        }
        .editable-name {
            border-bottom-color: #1e2b3c;
        }
        .editable-name:hover {
            background-color: #e0e7ff;
        }
        .canvas-wrapper {
            background: #ffffff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.02);
        }
        .product-canvas-container {
            border-color: #eef2f6;
        }
        .hint-text {
            background: #f2f6fb;
            color: #6b7b8f;
        }
        .control-panel {
            background: #1e2b3c;
            color: #eef4fa;
        }
        .control-panel h2 {
            color: white;
            text-shadow: none;
        }
        .option-group {
            border-bottom-color: #304357;
        }
        .option-group h3 {
            color: #8fa5c0;
        }
        .color-label {
            color: #d3e0f0;
        }
        input[type="color"] {
            border-color: #3c5068;
        }
        .checkbox-row {
            color: #b0c5dd;
        }
        .checkbox-row input[type="checkbox"] {
            accent-color: #4d7ca1;
        }
        .feature-checkbox {
            color: #b0c5dd;
        }
        .feature-checkbox input[type="checkbox"] {
            accent-color: #4d7ca1;
        }
        .wallpaper-upload {
            background: #253544;
            border-color: #5d7390;
        }
        .action-btn {
            background: #2e4057;
            color: white;
            border-color: #4d627c;
        }
        .action-btn:hover {
            background: #3e5670;
        }
        .wallpaper-status {
            color: #a6bbd4;
        }
        .slider-label {
            color: #b0c5dd;
        }
        input[type=range] {
            background: #304357;
        }
        input[type=range]::-webkit-slider-thumb {
            background: white;
            box-shadow: 0 2px 6px black;
        }
        .export-btn {
            background: #2f5778;
            color: white;
            border-color: #41729f;
        }
        .export-btn:hover {
            background: #3a6a91;
        }
        .export-btn.secondary {
            background: #2d3e54;
            border-color: #4c607b;
        }
        .export-btn.secondary:hover {
            background: #3c506a;
        }
        .footer-note {
            color: #627a99;
            border-top-color: #2f4259;
        }
        .designer-credit {
            color: #a0b2c4;
        }

        /* ----- 粉色主题（青春活力版） ----- */
        body.theme-pink {
            background: #ffe4ec;
        }
        .theme-pink .editor-container {
            background: #ffffff;
            box-shadow: 0 20px 40px -12px rgba(255, 120, 160, 0.3);
            border: 1px solid #ffc0d0;
        }
        .theme-pink .preview-area {
            background: #fafcff;
            border-right-color: #e8ecf2;
        }
        .theme-pink .main-title {
            color: #1e2b3c;
        }
        .theme-pink .editable-name {
            border-bottom-color: #1e2b3c;
        }
        .theme-pink .editable-name:hover {
            background-color: #e0e7ff;
        }
        .theme-pink .canvas-wrapper {
            background: #ffffff;
            box-shadow: 0 4px 16px rgba(190, 140, 160, 0.1);
        }
        .theme-pink .product-canvas-container {
            border-color: #f0d0dd;
        }
        .theme-pink .hint-text {
            background: #ffeef4;
            color: #a87b8b;
        }
        .theme-pink .control-panel {
            background: #ffa5b9;
            color: #ffffff;
        }
        .theme-pink .control-panel h2 {
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .theme-pink .option-group {
            border-bottom-color: #ffd0dd;
        }
        .theme-pink .option-group h3 {
            color: #fff0f5;
        }
        .theme-pink .color-label {
            color: #ffffff;
        }
        .theme-pink input[type="color"] {
            border-color: #ff99b0;
        }
        .theme-pink .checkbox-row {
            color: #ffffff;
        }
        .theme-pink .checkbox-row input[type="checkbox"] {
            accent-color: #ff7f9f;
        }
        .theme-pink .feature-checkbox {
            color: #ffffff;
        }
        .theme-pink .feature-checkbox input[type="checkbox"] {
            accent-color: #ff7f9f;
        }
        .theme-pink .wallpaper-upload {
            background: #ffe0e8;
            border-color: #ffb0c2;
        }
        .theme-pink .action-btn {
            background: #ff7f9f;
            color: #ffffff;
            border-color: #ffbfcf;
        }
        .theme-pink .action-btn:hover {
            background: #ff6b8f;
        }
        .theme-pink .wallpaper-status {
            color: #4a2a36;
        }
        .theme-pink .slider-label {
            color: #ffffff;
        }
        .theme-pink input[type=range] {
            background: #ffd0dd;
        }
        .theme-pink input[type=range]::-webkit-slider-thumb {
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(255, 80, 120, 0.5);
        }
        .theme-pink .export-btn {
            background: #ff6b8f;
            color: white;
            border-color: #ffbfcf;
        }
        .theme-pink .export-btn:hover {
            background: #ff4f7a;
        }
        .theme-pink .export-btn.secondary {
            background: #ff8faa;
            border-color: #ffbfcf;
        }
        .theme-pink .export-btn.secondary:hover {
            background: #ff7a9a;
        }
        .theme-pink .footer-note {
            color: #ffffff;
            border-top-color: #ffd0dd;
        }
        .theme-pink .designer-credit {
            color: #d96b8a;
        }

        /* 左上角主题切换按钮 */
        .theme-toggle-wrapper {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .theme-toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: #2f5778;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .theme-pink .theme-toggle-btn {
            background: #ff7f9f;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.05);
        }
        .theme-toggle-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<div class="editor-container">
    <!-- 左上角主题切换按钮 -->
    <div class="theme-toggle-wrapper">
        <div class="theme-toggle-btn" id="themeToggle" title="切换主题"></div>
    </div>

    <div class="preview-area">
        <div class="main-title" id="mainTitle">
            <span id="editableName" class="editable-name">你</span> 的 Hitboard Air
        </div>
        <div class="canvas-wrapper">
            <div class="product-canvas-container" id="canvasContainer">
                <canvas id="productCanvas" width="2600" height="1000"></canvas>
            </div>
            <div class="hint-text">
                <span>🖱️ 拖拽平移</span>
                <span>⚡ 滚轮缩放</span>
                <span>🔄 双击翻转</span>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <h2>选项</h2>

        <div class="option-group">
            <h3>外观：选择颜色</h3>
            <!-- 顺序调整为：按键颜色、盖板颜色、外壳颜色 -->
            <div class="color-row">
                <span class="color-label">按键颜色</span>
                <input type="color" id="buttonColor" value="#2b3b4c">
            </div>
            <div class="color-row">
                <span class="color-label">盖板颜色</span>
                <input type="color" id="panelColor" value="#d9e2ec">
            </div>
            <div class="color-row">
                <span class="color-label">外壳颜色</span>
                <input type="color" id="caseColor" value="#3a4a5e">
            </div>
            <!-- 复选框文案修改 -->
            <div class="checkbox-row">
                <input type="checkbox" id="unifyColors">
                <label for="unifyColors">面板与按键跟随外壳颜色</label>
            </div>
        </div>

        <div class="option-group">
            <h3>壁纸：设计你的壁纸</h3>
            <div class="wallpaper-upload">
                <div class="button-group">
                    <button class="action-btn" id="uploadWallpaperBtn">📁 选择图片</button>
                    <button class="action-btn small" id="clearWallpaperBtn">🗑️ 清除</button>
                </div>
                <input type="file" id="wallpaperFile" accept="image/*" class="file-input">
                <div class="wallpaper-status" id="wallpaperStatus">未设置壁纸</div>
                <div class="slider-container">
                    <div class="slider-label">
                        <span>缩放</span>
                        <span id="scaleValue">1.00x</span>
                    </div>
                    <input type="range" id="scaleSlider" min="0.2" max="3.0" step="0.01" value="1.0">
                </div>
            </div>
            <div style="margin-top: 16px;">
                <button class="export-btn" id="exportWallpaperBtn" style="width:100%;">
                    <span>🖼️ 导出壁纸 (A4打印)</span>
                    <span style="font-size:1.2rem;">↗</span>
                </button>
            </div>
        </div>

        <div class="option-group">
            <h3>其他配置</h3>
            <div class="feature-checkbox">
                <input type="checkbox" id="magneticCheck">
                <label for="magneticCheck">加装磁轴（3个方向键）</label>
            </div>
            <div class="feature-checkbox">
                <input type="checkbox" id="microCheck">
                <label for="microCheck">加装微动按键（2个功能键）</label>
            </div>
        </div>

        <div class="export-buttons">
            <button class="export-btn secondary" id="exportProductBtn">
                <span>📦 导出产品配置 (含物料清单)</span>
                <span style="font-size:1.2rem;">↗</span>
            </button>
        </div>
        <!-- 页脚文案修改 -->
        <div class="footer-note">
            科学街霸，从输入设备做起。
        </div>
    </div>
</div>
<div class="designer-credit">Designed by 搅局 · 双主题版</div>

<script>
// JavaScript 部分与上一版本完全相同，此处完整保留
(function() {
    const SCALE = 10; // 1mm = 10px

    // 外框 260x100mm，圆角13mm
    const outerW = 260 * SCALE;        // 2600
    const outerH = 100 * SCALE;        // 1000
    const outerRadius = 13 * SCALE;    // 130px

    // 内框 (盖板区域) 255.2x95.2mm

    const innerH = 95.2 * SCALE;       // 952
    const offsetX = (outerW - innerW) / 2; // 24px
    const offsetY = (outerH - innerH) / 2; // 24px
    const innerRadius = 11.1 * SCALE;   // 111px

    // 按键半径
    const buttonRadii = {
        23: 23.5 / 2 * SCALE,   // 117.5px
        26: 26.5 / 2 * SCALE,   // 132.5px
        5: 5.4 / 2 * SCALE      // 27px
    };

    // 按键坐标
    const buttons = [
        { cx: 466, cy: 153, r: buttonRadii[23] }, // 0
        { cx: 718, cy: 156, r: buttonRadii[23] }, // 1

        { cx: 1456, cy: 407, r: buttonRadii[23] }, // 3

        { cx: 1882, cy: 156, r: buttonRadii[23] }, // 6
        { cx: 2134, cy: 154, r: buttonRadii[23] }, // 7

        { cx: 1696, cy: 481, r: buttonRadii[23] }, // 9
        { cx: 1940, cy: 423, r: buttonRadii[23] }, // 10
        { cx: 2192, cy: 418, r: buttonRadii[23] }, // 11
        { cx: 2443, cy: 455, r: buttonRadii[23] }, // 12
        { cx: 1151, cy: 833, r: buttonRadii[26] }, // 13
        { cx: 1449, cy: 833, r: buttonRadii[26] }, // 14
        { cx: 140, cy: 80, r: buttonRadii[5] },    // 15
        { cx: 250, cy: 80, r: buttonRadii[5] }     // 16
    ];

    const DIRECTION_INDICES = [0, 1, 2];
    const MICRO_INDICES = [15, 16];

    const canvas = document.getElementById('productCanvas');
    const ctx = canvas.getContext('2d');

    // 颜色值 (从输入框获取)
    let caseColor = document.getElementById('caseColor').value;
    let panelColor = document.getElementById('panelColor').value;
    let buttonColor = document.getElementById('buttonColor').value;

    // 配件状态
    let magneticEnabled = false;
    let microEnabled = false;

    // 透明度
    const alphaCase = 0.9;
    const alphaPanel = 0.85;
    const alphaButton = 0.95;

    // 壁纸状态
    let wallpaperImage = null;
    let wallpaperScale = 1.0;
    let wallpaperOffsetX = 0;
    let wallpaperOffsetY = 0;
    let wallpaperFlipX = false;
    let wallpaperDimmed = false;
    let panelColorActive = false;

    // 交互
    let isDragging = false;
    let lastMouseX = 0, lastMouseY = 0;
    let userName = '';

    // 文本LOGO参数
    const logoText = 'Hitboard Air';
    const targetLogoWidth = 80 * SCALE; // 800px
    const logoPosX = 11.63 * SCALE;
    const logoPosY = 5.2 * SCALE;

    // DOM 元素
    const caseInput = document.getElementById('caseColor');
    const panelInput = document.getElementById('panelColor');
    const buttonInput = document.getElementById('buttonColor');
    const unifyCheckbox = document.getElementById('unifyColors');
    const magneticCheck = document.getElementById('magneticCheck');
    const microCheck = document.getElementById('microCheck');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleSpan = document.getElementById('scaleValue');
    const wallpaperStatus = document.getElementById('wallpaperStatus');
    const fileInput = document.getElementById('wallpaperFile');
    const uploadBtn = document.getElementById('uploadWallpaperBtn');
    const clearWallpaperBtn = document.getElementById('clearWallpaperBtn');
    const exportWallpaperBtn = document.getElementById('exportWallpaperBtn');
    const exportProductBtn = document.getElementById('exportProductBtn');
    const editableNameSpan = document.getElementById('editableName');
    const mainTitleDiv = document.getElementById('mainTitle');
    const themeToggle = document.getElementById('themeToggle');

    // 主题预设颜色
    const themeColors = {
        dark: {
            case: '#3a4a5e',
            panel: '#d9e2ec',
            button: '#2b3b4c'
        },
        pink: {
            case: '#cfa3b0',
            panel: '#f2dbe0',
            button: '#b48797'
        }
    };

    // 当前主题标记
    let isPinkTheme = false; // 默认深色
    // 用户是否已自定义颜色（一旦手动修改颜色，设为true）
    let userCustomized = false;

    // 主题切换函数
    function switchTheme(toPink) {
        if (toPink) {
            document.body.classList.add('theme-pink');
            isPinkTheme = true;
        } else {
            document.body.classList.remove('theme-pink');
            isPinkTheme = false;
        }

        // 如果用户从未自定义过颜色，则更新产品颜色为当前主题的默认值
        if (!userCustomized) {
            const colors = toPink ? themeColors.pink : themeColors.dark;
            caseInput.value = colors.case;
            panelInput.value = colors.panel;
            buttonInput.value = colors.button;

            // 更新变量并重绘
            caseColor = colors.case;
            panelColor = colors.panel;
            buttonColor = colors.button;

            // 如果统一颜色勾选，需同步（但切换主题时不改变勾选状态，简单处理）
            if (unifyCheckbox.checked) {
                panelColor = caseColor;
                buttonColor = caseColor;
                panelInput.value = caseColor;
                buttonInput.value = caseColor;
            }
            draw();
        }
        // 如果已自定义，则只切换UI，不改颜色
    }

    // 点击切换
    themeToggle.addEventListener('click', () => {
        switchTheme(!isPinkTheme);
    });

    // 编辑名字
    editableNameSpan.addEventListener('click', () => {
        const newName = prompt('请输入你的名字（留空则保持“你”）', userName);
        if (newName !== null) {
            userName = newName.trim();
            updateTitle();
        }
    });

    function updateTitle() {
        if (userName) {
            mainTitleDiv.innerHTML = `<span id="editableName" class="editable-name">${userName}</span> 的 Hitboard Air`;
        } else {
            mainTitleDiv.innerHTML = `<span id="editableName" class="editable-name">你</span> 的 Hitboard Air`;
        }
        document.getElementById('editableName').addEventListener('click', () => {
            const newName = prompt('请输入你的名字（留空则保持“你”）', userName);
            if (newName !== null) {
                userName = newName.trim();
                updateTitle();
            }
        });
    }

    // 监听配件选项
    function updateFeatures() {
        magneticEnabled = magneticCheck.checked;
        microEnabled = microCheck.checked;
        draw();
    }
    magneticCheck.addEventListener('change', updateFeatures);
    microCheck.addEventListener('change', updateFeatures);

    // 颜色变暗
    function darkenColor(hex, percent) {
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        r = Math.max(0, Math.min(255, r + percent * 2.55));
        g = Math.max(0, Math.min(255, g + percent * 2.55));
        b = Math.max(0, Math.min(255, b + percent * 2.55));
        return `#${(r < 16 ? '0' : '') + r.toString(16)}${(g < 16 ? '0' : '') + g.toString(16)}${(b < 16 ? '0' : '') + b.toString(16)}`;
    }

    // 绘制文本LOGO
    function drawLogoText(ctx, panelColor) {
        if (!panelColor) return;
        const darkColor = darkenColor(panelColor, -5);
        ctx.save();
        ctx.font = 'bold 200px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        const metrics = ctx.measureText(logoText);
        const actualWidth = metrics.width;
        const scale = targetLogoWidth / actualWidth;
        ctx.translate(logoPosX, outerH - logoPosY);
        ctx.scale(scale, scale);
        ctx.fillStyle = darkColor;
        ctx.globalAlpha = 0.2;
        ctx.fillText(logoText, 0, 0);
        ctx.restore();
    }

    // 绘制主函数
    function draw() {
        ctx.clearRect(0, 0, outerW, outerH);

        // 外壳
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(outerRadius, 0);
        ctx.lineTo(outerW - outerRadius, 0);
        ctx.quadraticCurveTo(outerW, 0, outerW, outerRadius);
        ctx.lineTo(outerW, outerH - outerRadius);
        ctx.quadraticCurveTo(outerW, outerH, outerW - outerRadius, outerH);
        ctx.lineTo(outerRadius, outerH);
        ctx.quadraticCurveTo(0, outerH, 0, outerH - outerRadius);
        ctx.lineTo(0, outerRadius);
        ctx.quadraticCurveTo(0, 0, outerRadius, 0);
        ctx.closePath();
        ctx.fillStyle = `rgba(${parseInt(caseColor.slice(1,3),16)},${parseInt(caseColor.slice(3,5),16)},${parseInt(caseColor.slice(5,7),16)},${alphaCase})`;
        ctx.fill();
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.restore();

        // 盖板区域剪裁
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(offsetX + innerRadius, offsetY);
        ctx.lineTo(offsetX + innerW - innerRadius, offsetY);
        ctx.quadraticCurveTo(offsetX + innerW, offsetY, offsetX + innerW, offsetY + innerRadius);
        ctx.lineTo(offsetX + innerW, offsetY + innerH - innerRadius);
        ctx.quadraticCurveTo(offsetX + innerW, offsetY + innerH, offsetX + innerW - innerRadius, offsetY + innerH);
        ctx.lineTo(offsetX + innerRadius, offsetY + innerH);
        ctx.quadraticCurveTo(offsetX, offsetY + innerH, offsetX, offsetY + innerH - innerRadius);
        ctx.lineTo(offsetX, offsetY + innerRadius);
        ctx.quadraticCurveTo(offsetX, offsetY, offsetX + innerRadius, offsetY);
        ctx.closePath();
        ctx.clip();

        // 面板颜色
        ctx.fillStyle = `rgba(${parseInt(panelColor.slice(1,3),16)},${parseInt(panelColor.slice(3,5),16)},${parseInt(panelColor.slice(5,7),16)},${alphaPanel})`;
        ctx.fillRect(offsetX, offsetY, innerW, innerH);

        // 壁纸
        if (wallpaperImage) {
            const imgW = wallpaperImage.naturalWidth;
            const imgH = wallpaperImage.naturalHeight;
            const centerX = offsetX + innerW/2;
            const centerY = offsetY + innerH/2;
            ctx.save();
            ctx.translate(centerX + wallpaperOffsetX, centerY + wallpaperOffsetY);
            ctx.scale(wallpaperFlipX ? -wallpaperScale : wallpaperScale, wallpaperScale);
            if (wallpaperDimmed) ctx.globalAlpha = 0.2;
            ctx.drawImage(wallpaperImage, -imgW/2, -imgH/2, imgW, imgH);
            ctx.restore();
        }
        ctx.restore();

        // 盖板描边
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(offsetX + innerRadius, offsetY);
        ctx.lineTo(offsetX + innerW - innerRadius, offsetY);
        ctx.quadraticCurveTo(offsetX + innerW, offsetY, offsetX + innerW, offsetY + innerRadius);
        ctx.lineTo(offsetX + innerW, offsetY + innerH - innerRadius);
        ctx.quadraticCurveTo(offsetX + innerW, offsetY + innerH, offsetX + innerW - innerRadius, offsetY + innerH);
        ctx.lineTo(offsetX + innerRadius, offsetY + innerH);
        ctx.quadraticCurveTo(offsetX, offsetY + innerH, offsetX, offsetY + innerH - innerRadius);
        ctx.lineTo(offsetX, offsetY + innerRadius);
        ctx.quadraticCurveTo(offsetX, offsetY, offsetX + innerRadius, offsetY);
        ctx.closePath();
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.restore();

        // Logo
        if (!wallpaperImage) drawLogoText(ctx, panelColor);

        // 按键
        ctx.save();
        buttons.forEach(btn => {
            ctx.beginPath();
            ctx.arc(btn.cx, btn.cy, btn.r, 0, 2 * Math.PI);
            ctx.fillStyle = `rgba(${parseInt(buttonColor.slice(1,3),16)},${parseInt(buttonColor.slice(3,5),16)},${parseInt(buttonColor.slice(5,7),16)},${alphaButton})`;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#333333';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        });
        ctx.restore();

        // 配件标记
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.font = 'bold 50px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';

        if (magneticEnabled) {
            DIRECTION_INDICES.forEach(idx => {
                ctx.fillText('磁', buttons[idx].cx, buttons[idx].cy);
            });
        }
        if (microEnabled) {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            MICRO_INDICES.forEach(idx => {
                ctx.beginPath();
                ctx.arc(buttons[idx].cx, buttons[idx].cy, 15, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }
        ctx.restore();
    }

    // 颜色统一逻辑
    function applyUnify(shouldUnify) {
        if (shouldUnify) {
            panelColor = caseColor;
            buttonColor = caseColor;
            panelInput.value = caseColor;
            buttonInput.value = caseColor;
        }
        draw();
    }

    unifyCheckbox.addEventListener('change', (e) => {
        if (e.target.checked) {
            applyUnify(true);
        }
    });

    // 颜色输入监听：标记用户已自定义
    caseInput.addEventListener('input', (e) => {
        userCustomized = true;
        caseColor = e.target.value;
        if (unifyCheckbox.checked) {
            panelColor = caseColor;
            buttonColor = caseColor;
            panelInput.value = caseColor;
            buttonInput.value = caseColor;
        }
        draw();
    });

    panelInput.addEventListener('input', (e) => {
        userCustomized = true;
        panelColor = e.target.value;
        if (unifyCheckbox.checked) {
            unifyCheckbox.checked = false;
        }
        draw();
    });

    buttonInput.addEventListener('input', (e) => {
        userCustomized = true;
        buttonColor = e.target.value;
        if (unifyCheckbox.checked) {
            unifyCheckbox.checked = false;
        }
        draw();
    });

    // 壁纸预览
    function handlePanelFocus() {
        if (wallpaperImage) {
            panelColorActive = true;
            wallpaperDimmed = true;
            draw();
        }
    }
    function handlePanelBlur() {
        if (wallpaperImage) {
            panelColorActive = false;
            wallpaperDimmed = false;
            draw();
        }
    }
    panelInput.addEventListener('focus', handlePanelFocus);
    panelInput.addEventListener('blur', handlePanelBlur);

    // 双击翻转
    canvas.addEventListener('dblclick', (e) => {
        if (!wallpaperImage) return;
        e.preventDefault();
        wallpaperFlipX = !wallpaperFlipX;
        draw();
    });

    // 上传壁纸
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                wallpaperImage = img;
                const scale = innerW / img.naturalWidth;
                wallpaperScale = scale;
                wallpaperOffsetX = 0;
                wallpaperOffsetY = 0;
                wallpaperFlipX = false;
                scaleSlider.value = scale.toFixed(2);
                scaleSpan.innerText = scale.toFixed(2) + 'x';
                wallpaperStatus.innerText = `已加载: ${file.name.slice(0,15)}...`;
                draw();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 清除壁纸
    clearWallpaperBtn.addEventListener('click', () => {
        wallpaperImage = null;
        wallpaperDimmed = false;
        panelColorActive = false;
        wallpaperStatus.innerText = '未设置壁纸';
        draw();
    });

    // 缩放滑块
    scaleSlider.addEventListener('input', (e) => {
        if (!wallpaperImage) return;
        const val = parseFloat(e.target.value);
        wallpaperScale = val;
        scaleSpan.innerText = val.toFixed(2) + 'x';
        draw();
    });

    // 滚轮缩放
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (!wallpaperImage) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const centerX = offsetX + innerW/2;
        const centerY = offsetY + innerH/2;
        const oldScale = wallpaperScale;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        let newScale = oldScale * delta;
        newScale = Math.min(3.0, Math.max(0.2, newScale));
        const relX = (mouseX - centerX - wallpaperOffsetX) / oldScale;
        const relY = (mouseY - centerY - wallpaperOffsetY) / oldScale;
        wallpaperOffsetX = mouseX - centerX - relX * newScale;
        wallpaperOffsetY = mouseY - centerY - relY * newScale;
        wallpaperScale = newScale;
        scaleSlider.value = newScale;
        scaleSpan.innerText = newScale.toFixed(2) + 'x';
        draw();
    }, { passive: false });

    // 拖拽移动
    canvas.addEventListener('mousedown', (e) => {
        if (!wallpaperImage) return;
        e.preventDefault();
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        lastMouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        lastMouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !wallpaperImage) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const dx = mouseX - lastMouseX;
        const dy = mouseY - lastMouseY;
        wallpaperOffsetX += dx;
        wallpaperOffsetY += dy;
        lastMouseX = mouseX;
        lastMouseY = mouseY;
        draw();
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
    });

    // 导出壁纸
    function exportWallpaper() {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = 2970;
        exportCanvas.height = 2100;
        const eCtx = exportCanvas.getContext('2d');
        eCtx.fillStyle = '#ffffff';
        eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        const positions = [
            { left: 20*10, bottom: 108*10 },
            { left: 20*10, bottom: 7.8*10 }
        ];

        positions.forEach(pos => {
            const leftPx = pos.left;
            const bottomPx = pos.bottom;
            const topPx = exportCanvas.height - bottomPx - innerH;

            eCtx.save();
            eCtx.beginPath();
            eCtx.moveTo(leftPx + innerRadius, topPx);
            eCtx.lineTo(leftPx + innerW - innerRadius, topPx);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx, leftPx + innerW, topPx + innerRadius);
            eCtx.lineTo(leftPx + innerW, topPx + innerH - innerRadius);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx + innerH, leftPx + innerW - innerRadius, topPx + innerH);
            eCtx.lineTo(leftPx + innerRadius, topPx + innerH);
            eCtx.quadraticCurveTo(leftPx, topPx + innerH, leftPx, topPx + innerH - innerRadius);
            eCtx.lineTo(leftPx, topPx + innerRadius);
            eCtx.quadraticCurveTo(leftPx, topPx, leftPx + innerRadius, topPx);
            eCtx.closePath();
            eCtx.clip();

            eCtx.fillStyle = `rgba(${parseInt(panelColor.slice(1,3),16)},${parseInt(panelColor.slice(3,5),16)},${parseInt(panelColor.slice(5,7),16)},${alphaPanel})`;
            eCtx.fillRect(leftPx, topPx, innerW, innerH);

            if (wallpaperImage) {
                const centerX = leftPx + innerW/2;
                const centerY = topPx + innerH/2;
                eCtx.save();
                eCtx.translate(centerX + wallpaperOffsetX, centerY + wallpaperOffsetY);
                eCtx.scale(wallpaperFlipX ? -wallpaperScale : wallpaperScale, wallpaperScale);
                eCtx.drawImage(wallpaperImage, -wallpaperImage.naturalWidth/2, -wallpaperImage.naturalHeight/2, wallpaperImage.naturalWidth, wallpaperImage.naturalHeight);
                eCtx.restore();
            }
            eCtx.restore();

            eCtx.save();
            eCtx.strokeStyle = '#111111';
            eCtx.lineWidth = 1;
            eCtx.beginPath();
            eCtx.moveTo(leftPx + innerRadius, topPx);
            eCtx.lineTo(leftPx + innerW - innerRadius, topPx);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx, leftPx + innerW, topPx + innerRadius);
            eCtx.lineTo(leftPx + innerW, topPx + innerH - innerRadius);
            eCtx.quadraticCurveTo(leftPx + innerW, topPx + innerH, leftPx + innerW - innerRadius, topPx + innerH);
            eCtx.lineTo(leftPx + innerRadius, topPx + innerH);
            eCtx.quadraticCurveTo(leftPx, topPx + innerH, leftPx, topPx + innerH - innerRadius);
            eCtx.lineTo(leftPx, topPx + innerRadius);
            eCtx.quadraticCurveTo(leftPx, topPx, leftPx + innerRadius, topPx);
            eCtx.closePath();
            eCtx.stroke();
            eCtx.restore();
        });

        const link = document.createElement('a');
        link.download = 'Hitboard_Air_Wallpaper.png';
        link.href = exportCanvas.toDataURL('image/png');
        link.click();
    }

        link.click();
    }

    exportWallpaperBtn.addEventListener('click', exportWallpaper);
    exportProductBtn.addEventListener('click', exportProductConfig);

    canvas.style.cursor = 'grab';
    draw();
})();
